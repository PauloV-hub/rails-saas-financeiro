<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>SaaS Financeiro - Painel Completo com Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f6f9;
            margin: 40px;
            color: #333;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .dash-container {
            display: flex;
            gap: 15px;
            margin-bottom: 5px;
        }

        .dash-box {
            flex: 1;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        .bg-saldo {
            background: #2b6cb0;
        }

        .bg-receita {
            background: #38a169;
        }

        .bg-despesa {
            background: #e53e3e;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background: #2b6cb0;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
            font-weight: bold;
            margin-top: 5px;
        }

        button:hover {
            background: #2c5282;
        }

        button.secondary {
            background: #4a5568;
        }

        button.secondary:hover {
            background: #2d3748;
        }

        #console {
            background: #1a202c;
            color: #f7fafc;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            white-wrap: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .token-status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
        }

        .authenticated {
            background: #c6f6d5;
            color: #22543d;
        }

        .unauthenticated {
            background: #fed7d7;
            color: #742a2a;
        }
    </style>
</head>

<body>

    <div class="card" style="flex: none; width: 100%; max-width: 100%; box-sizing: border-box;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2> Dashboard Temporal</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <label style="margin: 0;">Mês/Ano:</label>
                <select id="dash_month" style="width: auto;" onchange="buscarDadosDashboard()">
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7" selected>Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
                <input type="number" id="dash_year" value="2026" style="width: 80px;" onchange="buscarDadosDashboard()">
            </div>
        </div>
        <div class="dash-container">
            <div class="dash-box bg-saldo">Saldo Mensal<br><span id="val_saldo">R$ 0,00</span></div>
            <div class="dash-box bg-receita">Receitas (+)<br><span id="val_receita">R$ 0,00</span></div>
            <div class="dash-box bg-despesa">Despesas (-)<br><span id="val_despesa">R$ 0,00</span></div>
        </div>
    </div>

    <div class="row">
        <div class="card">
            <h2>1. Conexão</h2>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" value="paulo.victor345@exemplo.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" value="SenhaSegura123">
            </div>
            <button onclick="efetuarLogin()">Efetuar Login</button>
            <div id="tokenStatus" class="token-status unauthenticated">Nenhum Token JWT Armazenado</div>

            <h2 style="margin-top: 30px;">2. Cadastrar Categoria</h2>
            <div class="form-group">
                <label>Nome</label>
                <input type="text" id="cat_name" placeholder="Ex: Alimentação">
            </div>
            <button onclick="criarCategoria()">Salvar Categoria</button>
        </div>

        <div class="card">
            <h2>3. Lançar Movimentação</h2>
            <div class="form-group">
                <label>Descrição</label>
                <input type="text" id="trans_desc" placeholder="Ex: Salário da TI ou Mercado">
            </div>
            <div class="form-group">
                <label>Valor (Use negativo para Despesas)</label>
                <input type="number" step="0.01" id="trans_amount" placeholder="Ex: 5000.00 ou -150.50">
            </div>
            <div class="form-group">
                <label>Data do Lançamento</label>
                <input type="date" id="trans_date" value="2026-07-01">
            </div>
            <div class="form-group">
                <label>Categoria Associada</label>
                <select id="trans_category_id">
                    <option value="">Faça login para carregar...</option>
                </select>
            </div>
            <button onclick="criarTransacao()">Salvar Lançamento</button>
        </div>

        <div class="card" style="max-width: 400px;">
            <h2>4. Console de Resposta</h2>
            <div id="console">Aguardando ações...</div>
        </div>
    </div>

    <script>
        let jwtToken = "";

        function atualizarLog(conteudo) {
            document.getElementById('console').innerText = typeof conteudo === 'object' ? JSON.stringify(conteudo, null, 2) : conteudo;
        }

        async function efetuarLogin() {
            atualizarLog("Autenticando...");
            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: {
                            email: document.getElementById('email').value,
                            password: document.getElementById('password').value
                        }
                    })
                });

                const data = await response.json();


                if (response.status === 200) {
                    const tokenHeader = response.headers.get('Authorization');
                    if (tokenHeader) {
                        jwtToken = tokenHeader;
                        document.getElementById('tokenStatus').innerText = "JWT Ativo!";
                        document.getElementById('tokenStatus').className = "token-status authenticated";
                        buscarCategorias();
                        buscarDadosDashboard();
                    }
                    atualizarLog({ statusHttp: response.status, mensagem: "Login realizado com sucesso!", dados: data });
                } else {
                    jwtToken = "";
                    const statusDiv = document.getElementById('tokenStatus');
                    statusDiv.innerText = "Falha na Autenticação";
                    statusDiv.className = "token-status unauthenticated";

                    atualizarLog({
                        statusHttp: response.status,
                        erro: "Não foi possível efetuar o login. Verifique suas credenciais.",
                        respostaServidor: data
                    });
                }
            } catch (error) {
                atualizarLog("Erro de conexão: " + error.message);
            }
        }

        async function buscarCategorias() {
            try {
                const response = await fetch('http://localhost:3000/categories', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json', 'Authorization': jwtToken }
                });
                const data = await response.json();
                if (response.status === 200) {
                    const select = document.getElementById('trans_category_id');
                    select.innerHTML = data.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('') || '<option value="">Crie uma categoria primeiro</option>';
                }
            } catch (error) { console.error(error); }
        }

        async function criarCategoria() {
            try {
                const response = await fetch('http://localhost:3000/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': jwtToken },
                    body: JSON.stringify({ category: { name: document.getElementById('cat_name').value } })
                });
                if (response.status === 201) {
                    document.getElementById('cat_name').value = '';
                    buscarCategorias();
                }
            } catch (error) { atualizarLog(error.message); }
        }

        async function criarTransacao() {
            atualizarLog("Inserindo transação...");
            const payload = {
                transaction: {
                    description: document.getElementById('trans_desc').value,
                    amount: parseFloat(document.getElementById('trans_amount').value),
                    date: document.getElementById('trans_date').value,
                    category_id: parseInt(document.getElementById('trans_category_id').value)
                }
            };

            try {
                const response = await fetch('http://localhost:3000/transactions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': jwtToken },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                atualizarLog(data);
                if (response.status === 201) {
                    document.getElementById('trans_desc').value = '';
                    document.getElementById('trans_amount').value = '';
                    buscarDadosDashboard(); // Recalcula o dashboard na hora
                }
            } catch (error) { atualizarLog(error.message); }
        }


        async function buscarDadosDashboard() {
            const m = document.getElementById('dash_month').value;
            const a = document.getElementById('dash_year').value;

            try {
                const response = await fetch(`http://localhost:3000/dashboard?month=${m}&year=${a}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json', 'Authorization': jwtToken }
                });
                const data = await response.json();

                if (response.status === 200) {
                    document.getElementById('val_saldo').innerText = `R$ ${parseFloat(data.saldo_total).toFixed(2)}`;
                    document.getElementById('val_receita').innerText = `R$ ${parseFloat(data.total_receitas).toFixed(2)}`;
                    document.getElementById('val_despesa').innerText = `R$ ${parseFloat(data.total_despesas).toFixed(2)}`;
                }
            } catch (error) { console.error(error); }
        }
    </script>
</body>

</html>
